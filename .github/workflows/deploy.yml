name: Deploy Three-Tier App to Azure VM

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-frontend:latest

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd /home/azureuser
            
            if [ ! -d "docker-assignment-ih" ]; then
              git clone https://github.com/${{ secrets.DOCKERHUB_USERNAME }}/docker-assignment-ih.git
            else
              cd docker-assignment-ih
              git pull
              cd ..
            fi
            
            cd docker-assignment-ih
            
            docker-compose down || true
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-frontend:latest
            
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker-compose up -d
            
            docker-compose ps
